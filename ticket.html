<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Ticket </title>
   <link rel="stylesheet" href="index.css">
    <link rel="font-awesome" href="fonts/Inconsolata-VariableFont_wdth,wght.ttf">
</head>
<body class="ticket-body" id="ticket-body">
        <div class="line-top">
            <img src="images/pattern-squiggly-line-top.svg" alt="">
        </div>  
        <div class="ticket-line-bottom">
            <img src="images/pattern-squiggly-line-bottom-desktop.svg" alt="">
        </div>
        <div class="ticket-line-bottom-tablet">
            <img src="images/pattern-squiggly-line-bottom-mobile-tablet.svg" alt="">
        </div>
        <div class="pattern-lines">
            <img src="images/pattern-lines.svg" alt="">
        </div>
        <div class="pattern-circle">
            <img src="images/pattern-circle.svg" alt="">
        </div>
        
    <div class="container" id="container">
            <div class="logo">
                <img src="images/logo-full.svg" alt="">
            </div>
        <div id="ticketResult"></div>
    </div>
    <button id="downloadBtn">Download Ticket</button>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js"></script>
    <script>
        const result = document.getElementById('ticketResult')
        const ticketMarkup = sessionStorage.getItem('ticketMarkup')

        if (ticketMarkup) {
            result.innerHTML = ticketMarkup
        } else {
            result.innerHTML = '<p>No ticket found. Please generate one first.</p>'
        }

        const downloadBtn = document.getElementById('downloadBtn')
        downloadBtn.addEventListener("click", async () => {
            const container = document.getElementById("container");
            await document.fonts.ready;

            htmlToImage.toPng(container, {
            pixelRatio: 4,
            cacheBust: true,
            backgroundColor: "#0d0221"
        }).then((dataUrl) => {
            const link = document.createElement("a");
            link.download = "ticket.png";
            link.href = dataUrl;
            link.click();
        });
});
    </script>
</body>
</html>
